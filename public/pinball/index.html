<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Pinball: Space Cadet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 40px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #00cfff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
    }

    header p {
      color: #666;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    #game-wrapper {
      position: relative;
      width: 100%;
      max-width: 800px;
    }

    /* The canvas the WASM engine renders into */
    canvas#canvas {
      display: block;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border: 2px solid #1e1e2e;
      border-radius: 6px;
      box-shadow: 0 0 40px rgba(0, 120, 255, 0.15);
      cursor: pointer;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 15, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      z-index: 10;
    }

    #loading-overlay.hidden { display: none; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #222;
      border-top-color: #00cfff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-text {
      font-size: 1rem;
      color: #aaa;
    }

    #controls-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 14px;
    }

    .key-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #888;
    }

    .key {
      display: inline-block;
      padding: 2px 8px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #ccc;
      box-shadow: 0 2px 0 #111;
    }

    #error-box {
      display: none;
      margin-top: 16px;
      padding: 14px 18px;
      background: #1e0a0a;
      border: 1px solid #5c1c1c;
      border-radius: 6px;
      color: #ff7070;
      font-size: 0.85rem;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>🚀 3D Pinball: Space Cadet</h1>
    <p>Original Windows XP game — running in your browser</p>
  </header>

  <div id="game-wrapper">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-text">Loading game engine…</div>
    </div>
  </div>

  <div id="controls-bar">
    <span class="key-hint"><span class="key">Z</span> Left Flipper</span>
    <span class="key-hint"><span class="key">/</span> Right Flipper</span>
    <span class="key-hint"><span class="key">Space</span> Launch Ball</span>
    <span class="key-hint"><span class="key">Enter</span> Nudge</span>
    <span class="key-hint"><span class="key">Esc</span> Pause / Menu</span>
    <span class="key-hint"><span class="key">F2</span> New Game</span>
  </div>

  <div id="error-box"></div>

  <script>
    const overlay   = document.getElementById('loading-overlay');
    const loadText  = document.getElementById('loading-text');
    const errorBox  = document.getElementById('error-box');

    function showError(msg) {
      overlay.classList.add('hidden');
      errorBox.style.display = 'block';
      errorBox.textContent   = '⚠️  ' + msg;
    }

    // Emscripten Module configuration — MUST be defined before the engine script loads
    var Module = {
      canvas: document.getElementById('canvas'),

      // Tell Emscripten where to find the .wasm binary and game asset files
      locateFile: function(filename) {
        if (filename.endsWith('.wasm')) {
          return 'engine/' + filename;
        }
        // All other assets (PINBALL.DAT, WAVs, etc.) come from the games/pinball/ folder
        return 'games/pinball/' + filename;
      },

      // Called when the engine is fully initialised and the game starts
      onRuntimeInitialized: function() {
        loadText.textContent = 'Starting game…';
        setTimeout(function() {
          overlay.classList.add('hidden');
        }, 800);
      },

      // Progress callback while assets load
      setStatus: function(text) {
        if (text) {
          loadText.textContent = text;
        }
      },

      // Suppress the default fullscreen error modal from Emscripten
      printErr: function(text) {
        console.warn('[SpaceCadet]', text);
      },

      print: function(text) {
        console.log('[SpaceCadet]', text);
      }
    };

    // Catch any uncaught JS errors during load
    window.addEventListener('error', function(e) {
      showError('Failed to load game engine. Check the browser console (F12) for details. ' +
                'Make sure you are running this through a web server, not file://');
    });
  </script>

  <!-- Load the WASM engine AFTER the Module config above -->
  <script src="engine/SpaceCadetPinball.js"></script>

</body>
</html>
